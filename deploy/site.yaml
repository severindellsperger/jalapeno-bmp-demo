- name: Deploy JAGW machines in all labs
  hosts: jagw
  vars:
    lab_user: ins
    kubectl_version: 1.34.1
    helm_version: 3.19.0
    microk8s_channel: 1.34/stable
  tasks:
    - name: Deploy Kubernetes (as root)
      become: true
      block:
        - name: Deploy MicroK8s
          ansible.builtin.include_tasks: ./tasks/microk8s.yaml
        - name: Add kubectl for easier management
          ansible.builtin.include_tasks: ./tasks/kubectl.yaml
        - name: Add Helm for jalapeno installation
          ansible.builtin.include_tasks: ./tasks/helm.yaml
    - name: Deploy Jalapeno and JAGW (as user)
      block:
        - name: Install Jalapeno via Helm
          ansible.builtin.include_tasks: ./tasks/jalapeno.yaml
        - name: Install JAGW via Helm
          ansible.builtin.include_tasks: ./tasks/jagw.yaml

- name: Deploy Infrastructure machines in all labs
  hosts: infra
  vars:
    lab_user: ins
    containerlab_version: 0.71.1
    containerlab_xrd: true
    go_version: 1.25.4
  tasks:
    - name: Deploy Docker, Containerlab, and Go (as root)
      become: true
      block:
        - name: Deploy Docker
          ansible.builtin.include_tasks: ./tasks/docker.yaml
        - name: Deploy Containerlab
          ansible.builtin.include_tasks: ./tasks/containerlab.yaml
        - name: Install Go
          ansible.builtin.include_tasks: ./tasks/go.yaml
    - name: Start Networking Lab (as user)
      block:
        - name: Start Closing-the-Loop infrastructure
          vars:
            docker_user: ibn-closing-pull
            docker_password: yua14FsNtb6UNdCHXso1
            docker_registry: registry.gitlab.ost.ch:45023
            # TODO: Refactor so we no longer need the public Git repo
            git_user: ibn-closing-clone
            git_password: 4XVCZjmEzfjt4pQWhJd1
            lab_repo: gitlab.ost.ch/ins-courses/sdn/exercises/closing-the-loop-public.git
            lab_target_path: closing-the-loop-public
            lab_subfolder: infrastructure
          ansible.builtin.include_tasks: ./tasks/clab_deploy.yaml
