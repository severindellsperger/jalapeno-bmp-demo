!
hostname {{ .ShortName }}
!
username cisco
 group root-lr
 group cisco-support
 secret very_secure_password
!
grpc
{{ if .Env.CLAB_MGMT_VRF }} vrf {{ .Env.CLAB_MGMT_VRF }}{{end}}
 port 9339
 no-tls
 address-family dual
!
{{- if .Env.CLAB_MGMT_VRF }}
vrf {{ .Env.CLAB_MGMT_VRF }}
 address-family ipv4 unicast
 !
 address-family ipv6 unicast
 !
{{- end}}
!
line default
  transport input ssh
!
netconf-yang agent
 ssh
!
interface MgmtEth0/RP0/CPU0/0
{{ if .Env.CLAB_MGMT_VRF }} vrf {{ .Env.CLAB_MGMT_VRF }}{{end}}
!
router static
{{ if .Env.CLAB_MGMT_VRF }} vrf {{ .Env.CLAB_MGMT_VRF }}{{end}}
{{- if .MgmtIPv4Gateway }}
 address-family ipv4 unicast
  0.0.0.0/0 MgmtEth0/RP0/CPU0/0 {{ .MgmtIPv4Gateway }}
  !
{{- end}}
{{- if .MgmtIPv6Gateway }}
 address-family ipv6 unicast
  ::/0 MgmtEth0/RP0/CPU0/0 {{ .MgmtIPv6Gateway }}
  !
{{- end}}
!
ssh server v2
{{- if .Env.CLAB_MGMT_VRF }}
ssh server vrf {{ .Env.CLAB_MGMT_VRF }}
{{- end}}
ssh server netconf {{ if .Env.CLAB_MGMT_VRF }} vrf {{ .Env.CLAB_MGMT_VRF }}{{end}}
!
lldp
!
performance-measurement
  interface GigabitEthernet0/0/0/0
  delay-measurement
   advertise-delay 2000
  !
 interface GigabitEthernet0/0/0/1
  delay-measurement
   advertise-delay 2000
  !
 !
!

telemetry model-driven
 destination-group telegraf
  address-family ipv4 192.168.250.11 port 32400
   encoding self-describing-gpb
   protocol grpc no-tls
  !
 !
 sensor-group delay
  sensor-path Cisco-IOS-XR-perf-meas-oper:performance-measurement/nodes/node/interfaces/interface-details/interface-detail/delay-measurement-session/last-advertisement-information/advertised-values
 !
 sensor-group utilization
  sensor-path openconfig-interfaces:interfaces/interface/state/counters/in-octets
  sensor-path openconfig-interfaces:interfaces/interface/state/counters/out-octets
 !
  sensor-group openconfig_interfaces
  sensor-path openconfig-interfaces:interfaces/interface/state/oper-status
  sensor-path openconfig-interfaces:interfaces/interface/subinterfaces/subinterface/openconfig-if-ip:ipv6/addresses/address
 !
 subscription interface-info
  sensor-group-id openconfig_interfaces sample-interval 0
  destination-id telegraf
 !
 subscription performance-metrics
  sensor-group-id delay sample-interval 1000
  sensor-group-id utilization sample-interval 1000
  destination-id telegraf
 !
!
vrf Cust-A
 address-family ipv4 unicast
  import route-target
   1:97
  !
  export route-target
   1:97
  export route-policy SET_COLOR_LOW_LATENCY
 !
interface Loopback0
 ipv6 address 7:7:7:7::/128
!
interface GigabitEthernet0/0/0/0
 description to XR-5
 ipv6 address 2001:db8:57::7/64
 no shutdown
!
interface GigabitEthernet0/0/0/1
 description to XR-6
 ipv6 address 2001:db8:67::7/64
 no shutdown
!
interface GigabitEthernet0/0/0/2
 description to Server-B
 ipv4 address 10.2.0.1/24
 vrf Cust-A
 no shutdown
!

router isis 1
 is-type level-2-only
 net 49.0000.0000.0007.00
 distribute link-state
 address-family ipv6 unicast
  metric-style wide
  segment-routing srv6
   locator MAIN
   !
  !
 !
 !
 interface Loopback0
  passive
  address-family ipv6 unicast
  !
 !
 interface GigabitEthernet0/0/0/0
  point-to-point
  address-family ipv6 unicast
  !
 !
 interface GigabitEthernet0/0/0/1
  point-to-point
  address-family ipv6 unicast
  !
 !        
!
route-policy drop
  drop
end-policy
!
route-policy pass
  pass
end-policy
!
!
prefix-set Server-B-Network
 10.2.0.0/24
end-set
!
extcommunity-set opaque color10-LOW-LATENCY
10
end-set
!
route-policy SET_COLOR_LOW_LATENCY
 if destination in Server-B-Network then
  set extcommunity color color10-LOW-LATENCY
 endif
 pass
end-policy
!
router bgp 64097
 bgp router-id 7.7.7.7
 address-family vpnv4 unicast
 !
 address-family link-state link-state
 !
 neighbor 1:1:1:1::
  remote-as 64097
  update-source Loopback0
  address-family vpnv4 unicast
  !
  address-family link-state link-state
  !
 !
 vrf Cust-A
  rd auto
  address-family ipv4 unicast
  !
  redistribute connected
  !
  segment-routing srv6
    locator MAIN
    alloc mode per-vrf
!
segment-routing
 srv6
  locators
   locator MAIN
    micro-segment behavior unode psp-usd
    prefix fc00:0:7::/48
   !
  !
 !
!